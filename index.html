<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>식쌍성 광도 곡선 웹 시뮬레이터</title>
    <style>
        body {
            background-color: #121212;
            color: #ffffff;
            font-family: 'Malgun Gothic', sans-serif;
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
        }
        .container {
            display: flex;
            flex-direction: row;
            gap: 20px;
            max-width: 1200px;
            width: 100%;
        }
        .canvas-container {
            flex: 2;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        .controls-container {
            flex: 1;
            background-color: #1e1e1e;
            padding: 25px;
            border-radius: 12px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.5);
            display: flex;
            flex-direction: column;
            gap: 20px;
        }
        canvas {
            background-color: #000000;
            border-radius: 12px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.5);
            width: 100%;
        }
        h2 { margin-top: 0; border-bottom: 2px solid #444; padding-bottom: 10px; }
        .control-group { display: flex; flex-direction: column; gap: 5px; }
        .control-header { display: flex; justify-content: space-between; font-weight: bold; }
        .val-display { color: #00d2ff; }
        input[type=range] {
            width: 100%;
            cursor: pointer;
            accent-color: #ff4757;
        }
        .instructions {
            background-color: #2b2b2b;
            padding: 15px;
            border-radius: 8px;
            font-size: 0.9em;
            line-height: 1.5;
            color: #ccc;
            margin-top: auto;
        }
        .highlight { color: #ff4757; font-weight: bold; }
    </style>
</head>
<body>

<div class="container">
    <!-- 시각화 영역 -->
    <div class="canvas-container">
        <!-- 궤도 시각화 (Sky View) -->
        <canvas id="skyCanvas" width="800" height="450"></canvas>
        <!-- 광도 곡선 그래프 (Light Curve) -->
        <canvas id="graphCanvas" width="800" height="350"></canvas>
    </div>

    <!-- 컨트롤 패널 -->
    <div class="controls-container">
        <h2>🛠️ 변수 조작 패널</h2>
        
        <div class="control-group">
            <div class="control-header"><span>⏰ 시간 (Phase)</span><span class="val-display" id="valPhase">0.00</span></div>
            <input type="range" id="slPhase" min="-0.5" max="0.5" step="0.01" value="0.0">
        </div>
        
        <div class="control-group">
            <div class="control-header"><span>주성 크기 (R1)</span><span class="val-display" id="valR1">1.5</span></div>
            <input type="range" id="slR1" min="0.5" max="2.0" step="0.05" value="1.5">
        </div>
        
        <div class="control-group">
            <div class="control-header"><span>동반 크기 (R2)</span><span class="val-display" id="valR2">0.8</span></div>
            <input type="range" id="slR2" min="0.1" max="1.5" step="0.05" value="0.8">
        </div>

        <div class="control-group">
            <div class="control-header"><span>주성 온도 (T1)</span><span class="val-display" id="valT1">1.5</span></div>
            <input type="range" id="slT1" min="0.5" max="2.0" step="0.05" value="1.5">
        </div>

        <div class="control-group">
            <div class="control-header"><span>동반 온도 (T2)</span><span class="val-display" id="valT2">0.8</span></div>
            <input type="range" id="slT2" min="0.1" max="2.0" step="0.05" value="0.8">
        </div>

        <div class="control-group">
            <div class="control-header"><span>궤도 경사각 (Inclination)</span><span class="val-display" id="valIncl">85.0°</span></div>
            <input type="range" id="slIncl" min="70.0" max="90.0" step="1.0" value="85.0">
        </div>

        <div class="instructions">
            <b>[이용 가이드]</b><br>
            1. <span class="highlight">시간(Phase)</span> 슬라이더를 움직여 별이 궤도를 돌게 해보세요.<br>
            2. 별이 서로 겹칠 때 아래 광도 그래프에 파이는 골짜기(식 현상)가 나타납니다.<br>
            3. <span class="highlight">궤도 경사각</span>을 낮추면 궤도가 비껴가며 식 현상이 사라지는 것을 관찰할 수 있습니다.
        </div>
    </div>
</div>

<script>
    // 수학적 연산 함수 (Python의 numpy 코드 변환)
    function clamp(val, min, max) {
        return Math.max(min, Math.min(max, val));
    }

    function getOverlapArea(d, r1, r2) {
        if (d >= r1 + r2) return 0.0;
        if (d <= Math.abs(r1 - r2)) return Math.PI * Math.pow(Math.min(r1, r2), 2);

        let val1 = clamp((r1*r1 + d*d - r2*r2) / (2 * r1 * d), -1.0, 1.0);
        let val2 = clamp((r2*r2 + d*d - r1*r1) / (2 * r2 * d), -1.0, 1.0);

        let phi = Math.acos(val1) * 2;
        let theta = Math.acos(val2) * 2;

        return 0.5 * r1*r1 * (phi - Math.sin(phi)) + 0.5 * r2*r2 * (theta - Math.sin(theta));
    }

    // 온도에 따른 별 색상 생성 (뜨거울수록 푸름, 차가울수록 붉음)
    function tempToColor(t) {
        let norm = clamp((t - 0.5) / 1.5, 0, 1);
        let r, g, b;
        if (norm < 0.5) {
            let n2 = norm * 2; 
            r = 255; g = 50 + 205 * n2; b = 50 + 50 * n2;
        } else {
            let n2 = (norm - 0.5) * 2; 
            r = 255 - 155 * n2; g = 255 - 105 * n2; b = 100 + 155 * n2;
        }
        return `rgb(${Math.floor(r)}, ${Math.floor(g)}, ${Math.floor(b)})`;
    }

    // 캔버스 및 슬라이더 요소 가져오기
    const skyCanvas = document.getElementById('skyCanvas');
    const skyCtx = skyCanvas.getContext('2d');
    const graphCanvas = document.getElementById('graphCanvas');
    const graphCtx = graphCanvas.getContext('2d');

    const sliders = ['Phase', 'R1', 'R2', 'T1', 'T2', 'Incl'];
    const state = {};

    function readState() {
        sliders.forEach(key => {
            state[key] = parseFloat(document.getElementById('sl' + key).value);
            let displayVal = state[key].toFixed(2);
            if(key === 'Incl') displayVal += '°';
            document.getElementById('val' + key).innerText = displayVal;
        });
    }

    // 메인 그리기 함수
    function draw() {
        readState();
        const { Phase, R1, R2, T1, T2, Incl } = state;
        const a = 4.0; // 궤도 반지름
        const inclRad = Incl * Math.PI / 180;
        
        const l1 = Math.pow(R1, 2) * Math.pow(T1, 4);
        const l2 = Math.pow(R2, 2) * Math.pow(T2, 4);
        const maxL = l1 + l2;

        // 곡선 데이터 사전 계산
        const points = 200;
        let curve = [];
        for (let i = 0; i <= points; i++) {
            let p = -0.5 + (i / points);
            let theta = 2 * Math.PI * p + Math.PI;
            let x = a * Math.sin(theta);
            let y = -a * Math.cos(theta) * Math.cos(inclRad);
            let d = Math.sqrt(x*x + y*y);
            let area = getOverlapArea(d, R1, R2);
            
            let isFront = Math.cos(theta) < 0;
            let loss = isFront ? area * Math.pow(T1, 4) : area * Math.pow(T2, 4);
            curve.push({ p: p, l: maxL - loss, x: x, y: y, isFront: isFront });
        }

        // 현재 위상 데이터 추출
        let currentIdx = Math.floor((Phase + 0.5) * points);
        currentIdx = clamp(currentIdx, 0, points);
        let curr = curve[currentIdx] || curve[0];

        // ---- [1] Sky View (우주 시각화) 그리기 ----
        const sW = skyCanvas.width;
        const sH = skyCanvas.height;
        skyCtx.clearRect(0, 0, sW, sH);
        
        // 텍스트 추가
        skyCtx.fillStyle = '#ffffff';
        skyCtx.font = "20px Arial";
        skyCtx.fillText("Visual Simulator (Sky View)", 20, 30);

        const scale = 35; // 픽셀 변환 비율
        const cx = sW / 2;
        const cy = sH / 2;

        // 궤도 점선 그리기
        skyCtx.beginPath();
        skyCtx.strokeStyle = "rgba(255,255,255,0.3)";
        skyCtx.setLineDash([5, 5]);
        for (let i = 0; i <= points; i++) {
            let px = cx + curve[i].x * scale;
            let py = cy - curve[i].y * scale; // 캔버스는 y가 아래로 증가하므로 반전
            if (i === 0) skyCtx.moveTo(px, py);
            else skyCtx.lineTo(px, py);
        }
        skyCtx.stroke();
        skyCtx.setLineDash([]);

        // 별 그리기 함수
        function drawStar(x, y, radius, color) {
            skyCtx.beginPath();
            skyCtx.arc(cx + x * scale, cy - y * scale, radius * scale, 0, Math.PI * 2);
            skyCtx.fillStyle = color;
            skyCtx.shadowBlur = radius * scale * 0.5;
            skyCtx.shadowColor = color;
            skyCtx.fill();
            skyCtx.shadowBlur = 0; // 초기화
        }

        // Z-Index (앞뒤 겹침) 처리
        if (curr.isFront) {
            drawStar(0, 0, R1, tempToColor(T1)); // 주성이 뒤
            drawStar(curr.x, curr.y, R2, tempToColor(T2)); // 동반성이 앞
        } else {
            drawStar(curr.x, curr.y, R2, tempToColor(T2)); // 동반성이 뒤
            drawStar(0, 0, R1, tempToColor(T1)); // 주성이 앞
        }

        // ---- [2] Light Curve (광도 곡선) 그리기 ----
        const gW = graphCanvas.width;
        const gH = graphCanvas.height;
        graphCtx.clearRect(0, 0, gW, gH);

        const padX = 60, padY = 40;
        const plotW = gW - padX * 2;
        const plotH = gH - padY * 2;
        const maxY = maxL * 1.1;

        // 배경 그리드 및 축
        graphCtx.strokeStyle = "#444";
        graphCtx.lineWidth = 1;
        graphCtx.beginPath();
        graphCtx.moveTo(padX, padY + plotH);
        graphCtx.lineTo(padX + plotW, padY + plotH);
        graphCtx.moveTo(padX, padY);
        graphCtx.lineTo(padX, padY + plotH);
        graphCtx.stroke();

        // 텍스트 추가
        graphCtx.fillStyle = '#ffffff';
        graphCtx.font = "18px Arial";
        graphCtx.fillText("Light Curve (Brightness)", padX, 25);
        graphCtx.font = "12px Arial";
        graphCtx.fillStyle = "#ccc";
        graphCtx.fillText("Time (Phase)", gW/2, gH - 10);
        graphCtx.fillText("Luminosity", 5, gH/2);

        // 곡선 그리기
        graphCtx.beginPath();
        graphCtx.strokeStyle = "#00d2ff";
        graphCtx.lineWidth = 3;
        curve.forEach((pt, i) => {
            let px = padX + ((pt.p + 0.5) * plotW);
            let py = padY + plotH - ((pt.l / maxY) * plotH);
            if (i === 0) graphCtx.moveTo(px, py);
            else graphCtx.lineTo(px, py);
        });
        graphCtx.stroke();

        // 현재 위치 마커 (빨간선, 빨간점)
        let currPx = padX + ((Phase + 0.5) * plotW);
        let currPy = padY + plotH - ((curr.l / maxY) * plotH);

        graphCtx.beginPath();
        graphCtx.strokeStyle = "rgba(255, 71, 87, 0.5)";
        graphCtx.setLineDash([5, 5]);
        graphCtx.moveTo(currPx, padY);
        graphCtx.lineTo(currPx, padY + plotH);
        graphCtx.stroke();
        graphCtx.setLineDash([]);

        graphCtx.beginPath();
        graphCtx.fillStyle = "#ff4757";
        graphCtx.arc(currPx, currPy, 8, 0, Math.PI * 2);
        graphCtx.fill();
    }

    // 슬라이더 이벤트 등록
    sliders.forEach(key => {
        document.getElementById('sl' + key).addEventListener('input', draw);
    });

    // 최초 1회 실행
    draw();
</script>

</body>
</html>
